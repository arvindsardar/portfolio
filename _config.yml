title: Gallery Project
email: arvindsardar@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  Portfolio of Arvind Sardar
domain: arvindsardar.github.io
baseurl: ""
url: "https://arvindsardar.github.io/portfolio"

# Build settings
# theme: minima
plugins:
  - jekyll-feed

sass:
    sass_dir: _sass
    style: compressed

imagesurl: "/assets/images/"
include: [_pages]
tags: [portfolio, web, layout, motion]

