---
layout: default
---

{% include galleryNav.html %}

<h1>{{ page.title }}</h1>

{{ content }}

<div class="gallery">
	{% for item in site.data.gallerydata %}
		{% if item.category == page.linkedcategory and item.active == 1 %}
		<div class="item">
			<div class="title">{{item.title }}</div>
			<div>
				<img data-zoom="" src="/assets/images/{{item.url}}">
			</div>
			<div class="words">{{item.description}}</div>
		</div>
		{% endif %}
	{% endfor %}
</div>


<script>
	mediumZoom('[data-zoom]', {
		background: 'rgba(255,255,255,0.9)',
	})
</script>
