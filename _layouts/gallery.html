---
layout: default
---

{% include galleryNav.html %}

<h1>{{ page.title }}</h1>
{{ content }}
<div class="gallery">
	{% for item in site.data.gallerydata %}
			{% if item.category == page.linkedcategory and item.active == 1 %}
			<div class="item">
				<div><img src="/assets/images/{{item.url}}"></div>
				<div class="detail">
					<div class="title">{{item.title }}</div>
					<div class="words">{{item.description}}</div>
				</div>
			</div>
			{% endif %}
	{% endfor %}
</div>
